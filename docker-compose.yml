services:
  db:
    image: postgres:16-alpine
    container_name: wellness_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cursach_db
    ports:
      - "5432:5432"
    volumes:
      - wellness_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cursach_db"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: wellness_backend
      env_file:
        - ./backend/.env
      environment:
        DATABASE_URL: postgresql://postgres:postgres@db:5432/cursach_db?schema=public
        PORT: 3001

        DEBUG_AUTH_NO_EMAIL: "true"

        RSS_IMPORT_MIN_HOURS: 84
        RSS_TIMEZONE: Europe/Moscow
        RSS_LIMIT_PER_FEED: 5
        RSS_IMAGE_DIR: public/images/articles
        RSS_PG_LOCK_KEY: 84512001
      ports:
        - "3001:3001"
      volumes:
        # Persist user uploads (avatars, article covers, documents) across restarts
        - wellness_uploads:/app/public/uploads
        # Persist RSS/article images across restarts
        - wellness_images:/app/public/images
      depends_on:
        db:
          condition: service_healthy
      healthcheck:
        test:
          [
            "CMD",
            "node",
            "-e",
            "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
          ]
        interval: 10s
        timeout: 3s
        retries: 12
      restart: unless-stopped

  chat:
    build:
      context: ./backend/chatbot
      dockerfile: Dockerfile
    container_name: wellness_chat
    env_file:
      - ./backend/.env
    environment:
      # optional; for production you should use explicit origins instead of "*"
      CHAT_CORS_ORIGINS: ${CHAT_CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    volumes:
      # Persist uploaded expert docs (optional, but useful for debugging)
      - wellness_chat_uploads:/app/uploads
    restart: unless-stopped
volumes:
  wellness_pgdata:
  wellness_uploads:
  wellness_images:
  wellness_chat_uploads: